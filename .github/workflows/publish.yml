name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (for example 2.1.3 or v2.1.3). Leave empty to use the current tag."
        required: false
        type: string
      dry_run:
        description: "If true, run validation/build only and skip platform uploads."
        required: true
        default: true
        type: boolean
      publish_curseforge:
        description: "Attempt CurseForge upload (ignored when dry_run=true)."
        required: true
        default: false
        type: boolean
      publish_modtale:
        description: "Attempt Modtale upload (ignored when dry_run=true)."
        required: true
        default: false
        type: boolean
      hytale_patchline:
        description: "Patchline for Hytale downloader (release or pre-release)."
        required: false
        default: "release"
        type: string
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest
    concurrency: release-${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $raw = "${{ github.event.inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($raw)) {
            $raw = "${{ github.ref_name }}"
          }
          if ([string]::IsNullOrWhiteSpace($raw)) {
            throw "Unable to resolve version. Provide workflow input 'version' or run from a version tag."
          }

          $normalized = $raw -replace '^v', ''
          "raw=$raw" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "version=$normalized" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Resolve publish flags
        id: flags
        shell: pwsh
        run: |
          $eventName = "${{ github.event_name }}"

          if ($eventName -eq "workflow_dispatch") {
            $dry = "${{ github.event.inputs.dry_run }}".ToLowerInvariant()
            $publishCurseForge = "${{ github.event.inputs.publish_curseforge }}".ToLowerInvariant()
            $publishModtale = "${{ github.event.inputs.publish_modtale }}".ToLowerInvariant()
          } else {
            # Tag pushes stay dry-run in Phase 1 until IDs/secrets are fully configured.
            $dry = "true"
            $publishCurseForge = "false"
            $publishModtale = "false"
          }

          if ($dry -eq "true") {
            $publishCurseForge = "false"
            $publishModtale = "false"
          }

          "dry_run=$dry" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "publish_curseforge=$publishCurseForge" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "publish_modtale=$publishModtale" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Validate release
        shell: pwsh
        run: |
          .\scripts\release\validate-release.ps1 -Version "${{ steps.version.outputs.version }}"

      - name: Prepare Hytale server jar
        id: hytale
        shell: pwsh
        env:
          HYTALE_DOWNLOADER_CREDENTIALS_B64: ${{ secrets.HYTALE_DOWNLOADER_CREDENTIALS_B64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:HYTALE_DOWNLOADER_CREDENTIALS_B64)) {
            Write-Warning "HYTALE_DOWNLOADER_CREDENTIALS_B64 is not set. Falling back to prebuilt GitHub release asset."
            "install_path=" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            exit 0
          }

          $patchline = "${{ github.event.inputs.hytale_patchline }}"
          if ([string]::IsNullOrWhiteSpace($patchline)) {
            $patchline = "release"
          }

          $workspace = Join-Path $PWD ".ci"
          New-Item -ItemType Directory -Path $workspace -Force | Out-Null

          $downloaderZipPath = Join-Path $workspace "hytale-downloader.zip"
          $downloaderDir = Join-Path $workspace "hytale-downloader"
          if (Test-Path -Path $downloaderDir) {
            Remove-Item -Path $downloaderDir -Recurse -Force
          }

          $curlArgs = @(
            "-fL",
            "--retry", "3",
            "--retry-delay", "2",
            "-o", $downloaderZipPath,
            "https://downloader.hytale.com/hytale-downloader.zip"
          )
          & curl.exe @curlArgs
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to download hytale-downloader.zip (curl exit code $LASTEXITCODE)."
          }

          Expand-Archive -LiteralPath $downloaderZipPath -DestinationPath $downloaderDir -Force
          $downloaderExe = Join-Path $downloaderDir "hytale-downloader-windows-amd64.exe"
          if (-not (Test-Path -Path $downloaderExe)) {
            throw "Downloader executable was not found at '$downloaderExe'."
          }

          $credentialsPath = Join-Path $workspace ".hytale-downloader-credentials.json"
          try {
            try {
              $credentialsBytes = [Convert]::FromBase64String($env:HYTALE_DOWNLOADER_CREDENTIALS_B64)
            } catch {
              throw "HYTALE_DOWNLOADER_CREDENTIALS_B64 was not valid base64."
            }
            [System.IO.File]::WriteAllBytes($credentialsPath, $credentialsBytes)

            $manifestPath = Join-Path $PWD "src\main\resources\manifest.json"
            $manifest = Get-Content -Path $manifestPath -Raw | ConvertFrom-Json
            $targetServerVersion = [string]$manifest.ServerVersion
            if ([string]::IsNullOrWhiteSpace($targetServerVersion)) {
              throw "ServerVersion was empty in $manifestPath."
            }
            $targetServerVersion = $targetServerVersion.Trim()

            $versionOutput = & $downloaderExe `
              -print-version `
              -patchline $patchline `
              -credentials-path $credentialsPath `
              -skip-update-check 2>&1
            if ($LASTEXITCODE -ne 0) {
              $versionOutputText = ($versionOutput | Out-String)
              throw "Failed to query downloader version for patchline '$patchline'. Output: $versionOutputText"
            }

            $versionOutputText = ($versionOutput | Out-String)
            $versionMatch = [regex]::Match($versionOutputText, "\d{4}\.\d{2}\.\d{2}-[A-Za-z0-9]+")
            if (-not $versionMatch.Success) {
              throw "Unable to parse downloader version from output: $versionOutputText"
            }

            $availableServerVersion = $versionMatch.Value
            Write-Host "Manifest ServerVersion: $targetServerVersion"
            Write-Host "Downloader version for patchline '$patchline': $availableServerVersion"

            if ($availableServerVersion.ToLowerInvariant() -ne $targetServerVersion.ToLowerInvariant()) {
              throw "Manifest ServerVersion '$targetServerVersion' does not match downloader version '$availableServerVersion' for patchline '$patchline'."
            }

            $gameZipPath = Join-Path $workspace "hytale-game.zip"
            & $downloaderExe `
              -patchline $patchline `
              -download-path $gameZipPath `
              -credentials-path $credentialsPath `
              -skip-update-check
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to download Hytale game zip with downloader (exit code $LASTEXITCODE)."
            }
            if (-not (Test-Path -Path $gameZipPath)) {
              throw "Downloader did not produce expected zip at '$gameZipPath'."
            }

            $gameExtractPath = Join-Path $workspace "hytale-game"
            if (Test-Path -Path $gameExtractPath) {
              Remove-Item -Path $gameExtractPath -Recurse -Force
            }
            Expand-Archive -LiteralPath $gameZipPath -DestinationPath $gameExtractPath -Force

            $serverJarCandidate = Get-ChildItem -Path $gameExtractPath -Recurse -Filter "HytaleServer.jar" |
              Select-Object -First 1
            if ($null -eq $serverJarCandidate) {
              throw "HytaleServer.jar was not found in downloaded game zip."
            }

            $installPath = Join-Path $workspace "hytale-install"
            $serverDir = Join-Path $installPath "Server"
            New-Item -ItemType Directory -Path $serverDir -Force | Out-Null
            $serverJarPath = Join-Path $serverDir "HytaleServer.jar"
            Copy-Item -Path $serverJarCandidate.FullName -Destination $serverJarPath -Force

            $jarInfo = Get-Item -Path $serverJarPath
            if ($jarInfo.Length -le 0) {
              throw "Prepared HytaleServer.jar is empty: '$serverJarPath'."
            }

            Remove-Item -Path $credentialsPath -Force -ErrorAction SilentlyContinue
            "install_path=$installPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            Write-Host "Prepared Hytale install path at '$installPath'."
          } catch {
            Write-Warning "Hytale downloader prep failed: $($_.Exception.Message)"
            Write-Warning "Falling back to prebuilt GitHub release asset."
            Remove-Item -Path $credentialsPath -Force -ErrorAction SilentlyContinue
            "install_path=" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            exit 0
          }

      - name: Build package
        id: build
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          .\scripts\release\build-package.ps1 `
            -Version "${{ steps.version.outputs.version }}" `
            -HytaleInstallPath "${{ steps.hytale.outputs.install_path }}" `
            -OutputDir "artifacts" `
            -ArtifactPathOutputFile "artifacts\artifact-path.txt"

          $artifactPath = (Get-Content -Path "artifacts\artifact-path.txt" -Raw).Trim()
          if ([string]::IsNullOrWhiteSpace($artifactPath)) {
            throw "Artifact path output was empty."
          }

          "artifact_path=$artifactPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Extract changelog
        id: changelog
        shell: pwsh
        run: |
          .\scripts\release\extract-changelog.ps1 `
            -Version "${{ steps.version.outputs.version }}" `
            -OutputPath "artifacts\changelog.md"

          $changelogPath = (Resolve-Path "artifacts\changelog.md").Path
          "changelog_path=$changelogPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ steps.version.outputs.version }}
          path: ${{ steps.build.outputs.artifact_path }}
          if-no-files-found: error

      - name: Publish to CurseForge
        if: ${{ steps.flags.outputs.publish_curseforge == 'true' }}
        shell: pwsh
        env:
          CURSEFORGE_API_TOKEN: ${{ secrets.CURSEFORGE_API_TOKEN }}
        run: |
          .\scripts\release\publish-curseforge.ps1 `
            -Version "${{ steps.version.outputs.version }}" `
            -ArtifactPath "${{ steps.build.outputs.artifact_path }}" `
            -ChangelogPath "${{ steps.changelog.outputs.changelog_path }}" `
            -DryRun $false

      - name: Publish to Modtale
        if: ${{ steps.flags.outputs.publish_modtale == 'true' }}
        shell: pwsh
        env:
          MODTALE_API_TOKEN: ${{ secrets.MODTALE_API_TOKEN }}
        run: |
          .\scripts\release\publish-modtale.ps1 `
            -Version "${{ steps.version.outputs.version }}" `
            -ArtifactPath "${{ steps.build.outputs.artifact_path }}" `
            -ChangelogPath "${{ steps.changelog.outputs.changelog_path }}" `
            -DryRun $false

      - name: Create GitHub release
        if: ${{ github.ref_type == 'tag' && steps.flags.outputs.dry_run != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body_path: ${{ steps.changelog.outputs.changelog_path }}
          files: ${{ steps.build.outputs.artifact_path }}

      - name: Set GitHub release asset label
        if: ${{ github.ref_type == 'tag' && steps.flags.outputs.dry_run != 'true' }}
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"
          $artifactPath = "${{ steps.build.outputs.artifact_path }}"
          $displayName = [System.IO.Path]::GetFileName($artifactPath)

          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          $release = Invoke-RestMethod -Method Get -Headers $headers -Uri "https://api.github.com/repos/$repo/releases/tags/$tag"
          if (-not $release.assets -or $release.assets.Count -eq 0) {
            throw "No assets found on release tag '$tag'."
          }

          $asset = $release.assets |
            Where-Object { $_.label -eq $displayName -or $_.name -eq $displayName } |
            Select-Object -First 1

          if (-not $asset) {
            $sanitizedBase = [regex]::Escape(([System.IO.Path]::GetFileNameWithoutExtension($displayName) -replace '[^A-Za-z0-9._-]', '.'))
            $extension = [System.IO.Path]::GetExtension($displayName)
            $asset = $release.assets |
              Where-Object { $_.name -match "^$sanitizedBase" -and $_.name.EndsWith($extension) } |
              Sort-Object created_at -Descending |
              Select-Object -First 1
          }

          if (-not $asset) {
            throw "Unable to identify uploaded asset for '$displayName'."
          }

          if ($asset.label -ne $displayName) {
            $body = @{
              name = $asset.name
              label = $displayName
            } | ConvertTo-Json -Compress
            Invoke-RestMethod `
              -Method Patch `
              -Headers $headers `
              -Uri "https://api.github.com/repos/$repo/releases/assets/$($asset.id)" `
              -ContentType "application/json" `
              -Body $body | Out-Null
            Write-Host "Updated release asset label to '$displayName'."
          } else {
            Write-Host "Release asset label already matches '$displayName'."
          }
